<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BryOsk Market PoV — Story Card</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#33373e;display:flex;justify-content:center;align-items:flex-start;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;}
  /* 1080x1920 IG story stage. Screenshot this card. */
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:#fff;
    background:linear-gradient(160deg,#0c1326 0%,#16284a 50%,#21406f 100%);
    transform-origin:top center;}
  .stage::after{content:"";position:absolute;inset:0;
    background:radial-gradient(900px 500px at 80% 0%,rgba(120,170,255,.22),transparent 60%);}
  .pad{position:relative;z-index:1;padding:96px 84px;height:100%;display:flex;flex-direction:column;}
  .brand{font-size:30px;letter-spacing:.34em;text-transform:uppercase;opacity:.78;font-weight:600;}
  h1{font-size:96px;font-weight:800;letter-spacing:-.02em;line-height:1.02;margin:18px 0 8px;}
  .date{font-size:30px;opacity:.7;margin-bottom:46px;}
  .regime{font-size:26px;letter-spacing:.16em;text-transform:uppercase;opacity:.6;margin-bottom:14px;}
  .gtrack{height:20px;border-radius:14px;background:linear-gradient(90deg,#e0453e,#e8b13e,#16a36a);position:relative;margin-bottom:14px;}
  .gmark{position:absolute;top:50%;left:42%;width:38px;height:38px;border-radius:50%;background:#fff;border:7px solid #16284a;transform:translate(-50%,-50%);}
  .gval{font-size:30px;font-weight:700;opacity:.9;margin-bottom:50px;}
  .bl{font-size:42px;line-height:1.4;font-weight:500;margin-bottom:54px;}
  .bl b{color:#9fc2ff;}
  .levels{display:flex;flex-direction:column;gap:0;border-top:2px solid rgba(255,255,255,.18);}
  .lrow{display:flex;justify-content:space-between;align-items:center;padding:26px 4px;border-bottom:2px solid rgba(255,255,255,.12);}
  .la{font-size:40px;font-weight:700;}
  .lr{display:flex;align-items:baseline;gap:26px;}
  .ll{font-size:40px;font-weight:700;font-variant-numeric:tabular-nums;}
  .ld{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;width:200px;text-align:right;}
  .pos{color:#3ddc97;} .neg{color:#ff6b63;} .flat{color:#c7ccd6;}
  .tilt{margin-top:auto;background:rgba(255,255,255,.08);border-left:8px solid #9fc2ff;
    border-radius:14px;padding:34px 38px;font-size:34px;line-height:1.4;}
  .tilt b{color:#9fc2ff;}
  .foot{margin-top:34px;font-size:24px;opacity:.55;text-align:center;}
  @media(max-width:1100px){.stage{transform:scale(.42);}}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="pad">
    <div class="brand">BryOsk · Market PoV</div>
    <h1>Cross-Asset<br>Read</h1>
    <div class="date" id="d"></div>

    <div class="regime">Risk Regime</div>
    <div class="gtrack"><div class="gmark" id="gm"></div></div>
    <div class="gval" id="gv"></div>

    <div class="bl" id="bl"></div>

    <div class="levels" id="levels"></div>

    <div class="tilt" id="tilt"></div>
    <div class="foot">Research / education · not financial advice</div>
  </div>
</div>
<script>
/* shares the same DATA shape as BryOsk-Market-PoV.html — the daily run fills this */
const DATA={
  dateLong:"Wednesday, 27 May 2026", riskScore:42, riskLabel:"Mixed — defensive rotation",
  blShort:"Equities at records, but a <b>structural rotation into value, energy &amp; defensives</b> is pressuring crypto and gold. The relief rally is narrow.",
  key:[
    {a:"BTC",lvl:"$75,736",d:"−2.2%",dir:"neg"},
    {a:"ETH",lvl:"$2,067",d:"−2.7%",dir:"neg"},
    {a:"Gold",lvl:"$4,498",d:"−1.5%",dir:"neg"},
    {a:"S&P 500",lvl:"record",d:"+0.6%",dir:"pos"},
    {a:"10Y",lvl:"4.57%",d:"flat",dir:"flat"},
    {a:"IHSG",lvl:"6,162",d:"−8.4% wk",dir:"neg"},
    {a:"USD/IDR",lvl:"17,600",d:"weak",dir:"neg"}
  ],
  tiltShort:"Lean <b>value/defensives + energy</b> over high-beta tech · constructive <b>gold on dips</b> · sideline crypto &amp; EM-Indonesia pre-MSCI (29 May). <b>Med conviction.</b>"
};
const $=i=>document.getElementById(i);
$("d").textContent=DATA.dateLong;
$("gv").textContent="Score "+DATA.riskScore+"/100 — "+DATA.riskLabel;
$("gm").style.left=DATA.riskScore+"%";
$("bl").innerHTML=DATA.blShort;
$("tilt").innerHTML=DATA.tiltShort;
$("levels").innerHTML=DATA.key.map(k=>
  `<div class="lrow"><span class="la">${k.a}</span><span class="lr"><span class="ll">${k.lvl}</span><span class="ld ${k.dir}">${k.d}</span></span></div>`).join("");
</script>
</body>
</html>
